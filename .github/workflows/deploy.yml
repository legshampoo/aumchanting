name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image name (GHCR requires lowercase)
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=
            NEXT_PUBLIC_SITE_URL=https://aumchanting.com

      - name: Upload deploy config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          source: "deploy/docker-compose.yml"
          target: "/tmp/aumchanting-deploy"
          strip_components: 1

      # Lightsail → GHCR pulls often fail (connection reset). Runner has reliable GHCR
      # access; stream the image over SSH instead of docker compose pull on the server.
      - name: Stream image to Lightsail
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/lightsail
          chmod 600 ~/.ssh/lightsail
          docker pull "${IMAGE}:${GITHUB_SHA}"
          docker save "${IMAGE}:${GITHUB_SHA}" | gzip -1 | \
            ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/lightsail \
              "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}" \
              "gunzip | docker load"

      - name: Start app on Lightsail
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          envs: GITHUB_REPOSITORY,GITHUB_SHA,LIVEKIT_URL,LIVEKIT_API_KEY,LIVEKIT_API_SECRET
          script: |
            set -euo pipefail
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed. Run scripts/lightsail-bootstrap.sh once on the instance."
              exit 1
            fi
            sudo mkdir -p /opt/aumchanting
            sudo chown -R "$USER:$USER" /opt/aumchanting
            cp /tmp/aumchanting-deploy/docker-compose.yml /opt/aumchanting/
            REPO_LC="$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
            IMAGE="ghcr.io/${REPO_LC}"
            umask 077
            {
              printf '%s=%s\n' PORT 8787
              printf '%s=%s\n' LIVEKIT_URL "$LIVEKIT_URL"
              printf '%s=%s\n' LIVEKIT_API_KEY "$LIVEKIT_API_KEY"
              printf '%s=%s\n' LIVEKIT_API_SECRET "$LIVEKIT_API_SECRET"
            } > /opt/aumchanting/.env
            chmod 600 /opt/aumchanting/.env
            cd /opt/aumchanting
            export GITHUB_REPOSITORY="${REPO_LC}"
            docker tag "${IMAGE}:${GITHUB_SHA}" "${IMAGE}:latest"
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f
